name: release

# Build release binaries for Linux and macOS whenever a version tag is pushed,
# generate SHA-256 checksums, and publish everything to the matching GitHub
# Release. Triggered by tags like `v0.1.0`; `workflow_dispatch` allows a manual
# dry run that builds and uploads artifacts without creating a release.
#
# Windows is intentionally not a target: the daemon's IPC uses Unix domain
# sockets and the `nix` crate, so `mx-agent` is Unix-only. Windows was
# intentionally dropped (not future work); see README.md.
#
# The macOS-Intel target builds on `macos-15-intel` (a native Intel runner):
# the retired `macos-13` image never schedules (#303), and a native Intel
# runner is required because the packaging step executes the freshly built
# binary to generate completions/man pages (no cross-compile on arm64).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read # checkout only; the publish job holds contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-15-intel # native Intel runner; macos-13 was retired (#303)
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (pinned; dtolnay/rust-toolchain publishes no semver tags)
        with:
          toolchain: stable # SHA pin drops the @stable default toolchain; name it
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}
      - name: cargo build --release
        run: cargo build --release --locked --target ${{ matrix.target }} --bin mx-agent
      - name: Package archive and checksum
        id: package
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="dev"
          fi
          bin="mx-agent"
          staging="mx-agent-${version}-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/${bin}" "$staging/"
          cp README.md "$staging/" 2>/dev/null || true
          # Ship shell completions and man pages, generated from the freshly
          # built (runner-native) binary so downloads include them.
          scripts/gen-cli-artifacts.sh "$staging" "target/${{ matrix.target }}/release/${bin}"
          asset="${staging}.tar.gz"
          tar czf "$asset" "$staging"
          # macOS ships `shasum`; Linux ships `sha256sum`.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "${asset}.sha256"
          else
            shasum -a 256 "$asset" > "${asset}.sha256"
          fi
          echo "asset=${asset}" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.asset }}
            ${{ steps.package.outputs.asset }}.sha256
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.ref_type == 'tag'
    permissions:
      contents: write # softprops/action-gh-release creates the Release
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Collect checksums
        run: |
          set -euo pipefail
          cd artifacts
          # Combine every per-archive checksum into a single SHA256SUMS manifest,
          # rewriting paths so each line names just the archive file.
          : > SHA256SUMS
          for f in *.sha256; do
            [ "$f" = "SHA256SUMS" ] && continue
            sed 's# .*/# #' "$f" >> SHA256SUMS
            rm "$f"
          done
          echo "Published artifacts:"
          ls -1
          echo "---- SHA256SUMS ----"
          cat SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
          fail_on_unmatched_files: true
          generate_release_notes: true
