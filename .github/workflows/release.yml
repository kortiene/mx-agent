name: release

# Build release binaries for Linux and macOS whenever a version tag is pushed,
# generate SHA-256 checksums, and publish everything to the matching GitHub
# Release. Triggered by tags like `v0.1.0`; `workflow_dispatch` allows a manual
# dry run that builds and uploads artifacts without creating a release.
#
# Windows is intentionally not a target: the daemon's IPC uses Unix domain
# sockets and the `nix` crate, so the `mx-agent` binary is Unix-only for now
# (a Windows named-pipe transport is future work; see docs/architecture.md).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target }} --bin mx-agent
      - name: Package archive and checksum
        id: package
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="dev"
          fi
          bin="mx-agent"
          ext=""
          [ "${{ matrix.archive }}" = "zip" ] && ext=".exe"
          staging="mx-agent-${version}-${{ matrix.target }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/${bin}${ext}" "$staging/"
          cp README.md "$staging/" 2>/dev/null || true
          # Ship shell completions and man pages, generated from the freshly
          # built (runner-native) binary so downloads include them.
          scripts/gen-cli-artifacts.sh "$staging" "target/${{ matrix.target }}/release/${bin}${ext}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            asset="${staging}.zip"
            7z a "$asset" "$staging" >/dev/null
          else
            asset="${staging}.tar.gz"
            tar czf "$asset" "$staging"
          fi
          # macOS ships `shasum`; Linux and Git-Bash on Windows ship `sha256sum`.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "${asset}.sha256"
          else
            shasum -a 256 "$asset" > "${asset}.sha256"
          fi
          echo "asset=${asset}" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.asset }}
            ${{ steps.package.outputs.asset }}.sha256
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Collect checksums
        run: |
          set -euo pipefail
          cd artifacts
          # Combine every per-archive checksum into a single SHA256SUMS manifest,
          # rewriting paths so each line names just the archive file.
          : > SHA256SUMS
          for f in *.sha256; do
            [ "$f" = "SHA256SUMS" ] && continue
            sed 's# .*/# #' "$f" >> SHA256SUMS
            rm "$f"
          done
          echo "Published artifacts:"
          ls -1
          echo "---- SHA256SUMS ----"
          cat SHA256SUMS
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/SHA256SUMS
          fail_on_unmatched_files: true
          generate_release_notes: true
