name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check markdown links are relative where expected
        run: |
          test -f README.md
          test -f docs/architecture.md
          test -f docs/roadmap-rust.md

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: ShellCheck scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Detect Cargo workspace
        id: cargo
        run: |
          if [ -f Cargo.toml ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - uses: dtolnay/rust-toolchain@stable
        if: steps.cargo.outputs.present == 'true'
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        if: steps.cargo.outputs.present == 'true'
      - name: cargo fmt
        if: steps.cargo.outputs.present == 'true'
        run: cargo fmt --check
      - name: cargo clippy
        if: steps.cargo.outputs.present == 'true'
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: cargo build
        if: steps.cargo.outputs.present == 'true'
        run: cargo build --all
      - name: cargo test
        if: steps.cargo.outputs.present == 'true'
        run: cargo test --all
