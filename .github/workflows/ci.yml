name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Check markdown links are relative where expected
        run: |
          test -f README.md
          test -f docs/architecture.md
          test -f docs/roadmap-rust.md
          test -f docs/alpha-release-checklist.md
      - name: Check docs for E2EE confidentiality over-claims
        # Pure grep/bash, no toolchain — fails fast if the docs re-introduce the
        # exec/call/share/workspace confidentiality over-claim (#270/#252/#249).
        run: scripts/check-doc-claims.sh

  shell:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: ShellCheck scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh
      - name: Test doc-claims lint script
        # Runs scripts/test_check_doc_claims.sh, which exercises
        # check-doc-claims.sh against fixture files: forbidden phrases must
        # trigger exit 1 + file:line output; legitimate E2EE mentions (advisory
        # signal, "disabled", #249 references) must not cause false positives;
        # and the real project docs must pass (#270 regression guard).
        run: bash scripts/test_check_doc_claims.sh
      - name: Test sandbox-backend doc nits (issue #352)
        # Verifies that the §13.5 sandbox-backend list is accurate (none/bubblewrap/
        # docker/podman; firejail/chroot rejected at policy load), that user-guide.md
        # has no stray </content></invoke> markup, that README includes 'daemon reload',
        # and that the container cap-drop note is present across all canonical docs.
        run: bash scripts/test_doc_sandbox_nits.sh
      - name: Validate release workflow static acceptance criteria
        # Greps release.yml for the structural invariants required by issue #303:
        # no Windows packaging remnants (zip/exe/7z), --locked on the release
        # build, schedulable Intel runner, least-privilege job permissions, and
        # correct header comment wording. Runs on every PR so regressions are
        # caught before they reach a tag push.
        run: bash scripts/test_release_yml.sh
      - name: Validate CI/supply-chain static acceptance criteria
        # Greps every .github/workflows/*.yml for the supply-chain invariants from
        # issue #315: all actions SHA-pinned (40-hex), --locked on every CI/harness
        # cargo invocation, a timeout-minutes on every job, the MSRV job present and
        # version-locked to Cargo.toml/clippy.toml, and the scheduled advisories
        # workflow present. Fails the PR if any of these silently regress.
        run: bash scripts/test_ci_yml.sh
      - name: Self-test CI supply-chain validator
        # Fixture-based tests for test_ci_yml.sh itself: each invariant check must
        # fire (exit 1) on a minimal fixture that violates exactly that invariant,
        # and a fully compliant fixture must exit 0. Mirrors the pattern used by
        # test_check_doc_claims.sh / test_release_yml.sh (issue #315).
        run: bash scripts/test_ci_yml_checks.sh

  adw:
    # Runs the Agent Development Workflow helper unit tests (adw/). They are
    # stdlib-only and never invoke pi/claude/gh/git/cargo (everything is mocked
    # or exercised via --dry-run/--print-prompt), so no extra setup is needed.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'
      - name: ADW Python unit tests
        run: python -m unittest discover -s adw -p 'test_*.py'

  adw-sdlc:
    # Hermetic checks for the TypeScript ADW engine scaffold (adw_sdlc/):
    # frozen-lockfile install, the env-spread lint gate, typecheck, and the
    # vitest suite. No network APIs, no keys, no runner binaries are
    # exercised — runner SDKs are optionalDependencies and tests mock them.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: Env-spread lint gate (runner modules never inherit process.env)
        run: bash scripts/check-adw-sdlc-env.sh
      - name: Typecheck
        run: pnpm --filter adw-sdlc run typecheck
      - name: Unit tests
        run: pnpm --filter adw-sdlc run test

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Detect Cargo workspace
        id: cargo
        run: |
          if [ -f Cargo.toml ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (pinned; dtolnay/rust-toolchain publishes no semver tags)
        if: steps.cargo.outputs.present == 'true'
        with:
          # A SHA pin loses the @stable branch's implied default toolchain, so
          # name it explicitly (issue #315).
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: steps.cargo.outputs.present == 'true'
      - name: cargo fmt
        if: steps.cargo.outputs.present == 'true'
        run: cargo fmt --check
      - name: cargo clippy
        if: steps.cargo.outputs.present == 'true'
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - name: cargo build
        if: steps.cargo.outputs.present == 'true'
        run: cargo build --all --locked
      - name: cargo test
        if: steps.cargo.outputs.present == 'true'
        run: cargo test --all --locked
      - name: CLI artifact generation smoke check
        # Confirms the clap command tree still generates completions + man pages
        # cleanly, so the CLI reference cannot silently drift from the binary.
        if: steps.cargo.outputs.present == 'true'
        run: |
          cargo build --release -p mx-agent-cli --locked
          scripts/gen-cli-artifacts.sh "$RUNNER_TEMP/cli-artifacts" target/release/mx-agent

  msrv:
    # Compiles the whole workspace on the declared MSRV so rust-version in
    # Cargo.toml / msrv in clippy.toml cannot silently drift from what actually
    # builds (issue #315). matrix-sdk 0.18 declares rust-version 1.93, which is
    # the workspace floor — far above the historically-declared 1.74. Build-only
    # (not test): dev-dependencies frequently require a newer Rust than the
    # crate, so a full `cargo test` on the MSRV toolchain can fail for reasons
    # unrelated to the shipped MSRV. Do not run clippy here (lints differ across
    # versions).
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Detect Cargo workspace
        id: cargo
        run: |
          if [ -f Cargo.toml ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (pinned; dtolnay/rust-toolchain publishes no semver tags)
        if: steps.cargo.outputs.present == 'true'
        with:
          toolchain: "1.93" # keep in lockstep with Cargo.toml rust-version / clippy.toml msrv
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: steps.cargo.outputs.present == 'true'
      - name: cargo build (MSRV)
        if: steps.cargo.outputs.present == 'true'
        run: cargo build --all --locked

  rust-macos:
    # The peer-credential UID check has a macOS/BSD arm (`LOCAL_PEERCRED`, issue
    # #267) that the `ubuntu-latest` jobs never compile or exercise. This job
    # builds, lints, and tests the IPC crate on macOS so that arm is covered.
    # Scoped to `mx-agent-ipc` to keep the (costlier) macOS runner minimal and
    # avoid pulling the full Matrix/daemon toolchain.
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (pinned; dtolnay/rust-toolchain publishes no semver tags)
        with:
          toolchain: stable # SHA pin drops the @stable default toolchain; name it
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: cargo clippy (mx-agent-ipc)
        run: cargo clippy -p mx-agent-ipc --all-targets --locked -- -D warnings
      - name: cargo test (mx-agent-ipc)
        run: cargo test -p mx-agent-ipc --locked

  sandbox-linux:
    # Installs bubblewrap and runs the real-sandbox tests un-skipped, so a
    # regression in the bwrap argv cannot hide behind the graceful skip the other
    # jobs take (none install bwrap). MX_AGENT_REQUIRE_BWRAP makes the tests panic
    # instead of skipping if bwrap is somehow not usable on the runner (issue #310).
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MX_AGENT_REQUIRE_BWRAP: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Detect Cargo workspace
        id: cargo
        run: |
          if [ -f Cargo.toml ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi
      - name: Install bubblewrap
        if: steps.cargo.outputs.present == 'true'
        run: sudo apt-get update && sudo apt-get install -y bubblewrap
      - name: Allow unprivileged user namespaces (bubblewrap --unshare-user)
        # Ubuntu 24.04 (ubuntu-latest) restricts unprivileged user namespaces by
        # default via AppArmor; bwrap's `--unshare-user` then fails. Lift the
        # restriction so the real-sandbox tests exercise the hardened argv
        # (issue #310). `|| true` keeps this a no-op on images without the knob.
        if: steps.cargo.outputs.present == 'true'
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (pinned; dtolnay/rust-toolchain publishes no semver tags)
        if: steps.cargo.outputs.present == 'true'
        with:
          toolchain: stable # SHA pin drops the @stable default toolchain; name it
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: steps.cargo.outputs.present == 'true'
      - name: Real-sandbox tests (mx-agent-sandbox)
        if: steps.cargo.outputs.present == 'true'
        run: cargo test -p mx-agent-sandbox --locked
      - name: Real-bwrap orchestration e2e (mx-agent-daemon)
        if: steps.cargo.outputs.present == 'true'
        run: cargo test -p mx-agent-daemon --test task_orchestration_e2e --locked sandbox_policy_settings_flow_through_task_orchestration

  cargo-deny:
    # Enforces the dependency policy in deny.toml: security advisories, the
    # allowed-license set, and trusted crate sources. Denied licenses or
    # advisories fail this job (and therefore the PR). The scheduled audit.yml
    # re-runs `check advisories` weekly so a newly published advisory surfaces
    # without waiting for the next push (issue #315).
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check advisories bans licenses sources

  matrix-integration:
    # Boots the throwaway local homeserver (issue #59) and runs the daemon's
    # `#[ignore]`d Matrix integration test against it (issue #60). Docker, curl,
    # and jq are preinstalled on the GitHub-hosted ubuntu runner.
    runs-on: ubuntu-latest
    # The live homeserver suite legitimately runs ~35-44 min and has been growing
    # (34m -> 44m over recent runs); 35 was too tight and canceled green runs.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master (pinned; dtolnay/rust-toolchain publishes no semver tags)
        with:
          toolchain: stable # SHA pin drops the @stable default toolchain; name it
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Matrix integration test
        run: scripts/matrix_integration_test.sh --teardown
