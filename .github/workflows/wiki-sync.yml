name: wiki-sync

# Mirror the in-repo wiki/ folder to the GitHub wiki (<repo>.wiki.git) whenever
# wiki/ changes land on main. Runs server-side, so it fires regardless of how a
# change reaches main (PR merge via the GitHub UI/gh, or a direct push) — unlike
# a local pre-push hook, which only fires on `git push origin main`.

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
  workflow_dispatch: {}

permissions:
  contents: write

# Never let two syncs race the wiki repo.
concurrency:
  group: wiki-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Mirror wiki/ to the GitHub wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if ! ls wiki/*.md >/dev/null 2>&1; then
            echo "no wiki/*.md files to sync"
            exit 0
          fi

          wiki_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"
          work="$(mktemp -d)"

          # The wiki repo only exists once its first page has been created in the
          # GitHub UI. If the clone fails, surface a clear, actionable message.
          if ! git clone --quiet "$wiki_url" "$work"; then
            echo "::error::Could not clone the wiki repo. Create the first wiki page once in the GitHub UI, then re-run." >&2
            exit 1
          fi

          # Mirror: drop stale pages, copy the current set. Only *.md are managed.
          find "$work" -maxdepth 1 -name '*.md' -delete
          cp wiki/*.md "$work"/

          cd "$work"
          if [ -z "$(git status --porcelain)" ]; then
            echo "wiki already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit --quiet -m "Sync wiki from ${GITHUB_SHA:0:7}"
          git push --quiet origin HEAD
          echo "wiki synced from ${GITHUB_SHA:0:7}"
