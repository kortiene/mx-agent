name: populate-github

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - docs/github-issue-backlog.md
      - docs/github-management.md
      - scripts/populate_github.py
      - .github/workflows/populate-github.yml

permissions:
  contents: read
  issues: write

concurrency:
  group: populate-github
  cancel-in-progress: false

jobs:
  populate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.x'
      - name: Populate labels, milestones, and roadmap issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/populate_github.py
