name: populate-github

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - docs/github-issue-backlog.md
      - docs/github-management.md
      - scripts/populate_github.py
      - .github/workflows/populate-github.yml

permissions:
  contents: read
  issues: write

concurrency:
  group: populate-github
  cancel-in-progress: false

jobs:
  populate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.x'
      - name: Populate labels, milestones, and roadmap issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/populate_github.py
