name: Bug
description: Report incorrect behavior
labels: ["type:bug"]
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed Behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction Steps
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, mx-agent version/commit, Matrix homeserver, relevant config.
